name: CI

# Hermetic by construction: Silt is pure simulation — no model, no paid APIs, no live network
# anywhere in the test suite (see specfication/ARCHITECTURE.md §Testing and CI).

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest
